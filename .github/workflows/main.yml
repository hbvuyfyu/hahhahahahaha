name: Build Virtual Cam

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ── Android APK ──────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: true

      - name: Install NDK and CMake
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "ndk;27.0.12077973" \
            "cmake;3.22.1" \
            "build-tools;35.0.0" \
            "platforms;android-35" \
            --sdk_root=$ANDROID_HOME

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VirtualCam-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: VirtualCam-Release-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

  # ── Windows "Conect VCam" exe ─────────────────────────────────────────────
  build-windows:
    name: Build Windows Conect VCam.exe
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Windows exe
        working-directory: conect_vcam
        run: pyinstaller conect_vcam.spec --noconfirm --clean

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: ConectVCam-Windows-exe
          path: conect_vcam/dist/ConectVCam.exe
          retention-days: 30

  # ── GitHub Release (main branch only) ────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Download Android Debug APK
        uses: actions/download-artifact@v4
        with:
          name: VirtualCam-Debug-APK
          path: artifacts/

      - name: Download Android Release APK
        uses: actions/download-artifact@v4
        with:
          name: VirtualCam-Release-APK
          path: artifacts/

      - name: Download Windows exe
        uses: actions/download-artifact@v4
        with:
          name: ConectVCam-Windows-exe
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Virtual Cam v${{ github.run_number }}"
          body: |
            ## Virtual Cam v${{ github.run_number }}

            System-wide virtual camera injection for rooted Android devices + Windows remote control.

            ### Android App (Virtual Cam)
            - Real-time zoom / scale / pan updates (< 80 ms latency)
            - Full-quality image injection (ARGB_8888, no downsampling)
            - Link feature: control from Windows app via USB

            ### Windows App (Conect VCam)
            - Connects to Android via USB (ADB port forward)
            - Real-time sliders for zoom, scale, pan
            - Buttons for rotation (±90°) and mirror toggle
            - Dark theme GUI, no extra software needed

            ### Android Requirements
            - Android 8.0+ (API 26+)
            - Root access (Magisk recommended)
            - Valid access code on first launch

            ### Windows Connection
            1. Connect phone via USB, enable USB Debugging
            2. Run: `adb forward tcp:7979 tcp:7979`
            3. In Virtual Cam app → Enable Link → copy token
            4. Open `ConectVCam.exe`, paste token, click Connect
          files: |
            artifacts/app-debug.apk
            artifacts/app-release-unsigned.apk
            artifacts/ConectVCam.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
